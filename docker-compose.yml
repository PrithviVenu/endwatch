services:
  postgres:
    image: postgres:15
    container_name: endwatch-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: urlmonitor
      POSTGRES_PASSWORD: urlmonitor
      POSTGRES_DB: urlmonitor
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: endwatch-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  backend:
    build: ./backend
    container_name: endwatch-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      PORT: 5001
      DATABASE_URL: "postgresql://urlmonitor:urlmonitor@postgres:5432/urlmonitor"
      REDIS_URL: "redis://redis:6379"
    depends_on:
      - postgres
      - redis
    ports:
      - "5001:5001"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:5001/api
    container_name: endwatch-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  postgres_data:
  redis_data:
